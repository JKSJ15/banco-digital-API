name: CI BankAPI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
        uses: actions/checkout@v4

        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

        run: chmod +x mvnw

        run: ./mvnw clean test

        run: ./mvnw package -DskipTests